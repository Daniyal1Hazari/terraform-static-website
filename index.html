<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Terraform Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🚀 Welcome to My Terraform Website</h1>

        <div class="card">
            <h2>☁️ Hosted on AWS EC2</h2>
            <p>This website is hosted on an Amazon EC2 instance.</p>
        </div>

        <div class="card">
            <h2>⚙️ Deployed using GitHub Actions</h2>
            <p>Every code push automatically deploys the latest version through a CI/CD pipeline.</p>
        </div>

        <button onclick="showMessage()">Check Deployment Status</button>

        <p id="message"></p>

        <footer>
            <p>Created with using Terraform, AWS EC2 & GitHub Actions</p>
        </footer>
    </div>

    <script src="script.js"></script>

</body>
</html>
